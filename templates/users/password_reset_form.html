{% extends "base.html" %}
{% block title %}Redefinir senha — Orçai{% endblock %}
{% block body %}
<main class="flex flex-1 items-center justify-center px-4 py-12">
  <div class="w-full max-w-md rounded-2xl border border-white/10 bg-card p-8">
    <h1 class="text-xl font-semibold text-white">Redefinir senha</h1>
    <p class="mt-2 text-sm text-slate-400">Informe seu e-mail para receber o link (no desenvolvimento, o e-mail aparece no console).</p>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="w-full rounded-lg bg-orchid py-2.5 font-semibold text-white">Enviar</button>
    </form>
    <p class="mt-4 text-center text-sm"><a href="{% url 'users:login' %}" class="text-skyfi hover:underline">Voltar ao login</a></p>
  </div>
</main>
{% endblock %}
