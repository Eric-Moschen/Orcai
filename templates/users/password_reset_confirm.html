{% extends "base.html" %}
{% block title %}Nova senha — Orçai{% endblock %}
{% block body %}
<main class="flex flex-1 items-center justify-center px-4 py-12">
  <div class="w-full max-w-md rounded-2xl border border-white/10 bg-card p-8">
    {% if validlink %}
      <h1 class="text-xl font-semibold text-white">Definir nova senha</h1>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full rounded-lg bg-orchid py-2.5 font-semibold text-white">Salvar</button>
      </form>
    {% else %}
      <p class="text-red-300">Este link é inválido ou já foi usado.</p>
    {% endif %}
  </div>
</main>
{% endblock %}
