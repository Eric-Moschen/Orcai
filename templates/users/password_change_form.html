{% extends "base.html" %}
{% block title %}Alterar senha — Orçai{% endblock %}
{% block body %}
<main class="mx-auto max-w-md px-4 py-12">
  <div class="rounded-2xl border border-white/10 bg-card p-8">
    <h1 class="text-xl font-semibold text-white">Alterar senha</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="rounded-lg bg-orchid px-4 py-2 font-semibold text-white">Salvar</button>
    </form>
  </div>
</main>
{% endblock %}
