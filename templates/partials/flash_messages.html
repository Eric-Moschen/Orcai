{% if messages %}
<div id="flash-root" class="fixed left-0 right-0 top-0 z-[60] flex flex-col items-center gap-2 px-4 pt-4 pointer-events-none">
  {% for message in messages %}
  <div
    data-flash
    class="pointer-events-auto flex max-w-lg items-start gap-3 rounded-xl border px-4 py-3 text-sm shadow-lg backdrop-blur {% if message.tags == 'error' %}border-red-500/40 bg-red-950/90 text-red-100{% elif message.tags == 'success' %}border-emerald-500/40 bg-emerald-950/90 text-emerald-100{% elif message.tags == 'warning' %}border-amber-500/40 bg-amber-950/90 text-amber-100{% else %}border-white/15 bg-card/95 text-slate-100{% endif %}">
    <span class="mt-0.5 shrink-0">
      {% if message.tags == 'error' %}
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      {% elif message.tags == 'success' %}
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {% else %}
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {% endif %}
    </span>
    <p class="flex-1 leading-relaxed">{{ message }}</p>
    <button type="button" data-flash-dismiss class="rounded p-1 text-current opacity-70 hover:opacity-100" aria-label="Fechar">✕</button>
  </div>
  {% endfor %}
</div>
<script>
(function () {
  document.querySelectorAll('[data-flash-dismiss]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var row = btn.closest('[data-flash]');
      if (row) row.remove();
    });
  });
  setTimeout(function () {
    document.querySelectorAll('[data-flash]').forEach(function (el, i) {
      setTimeout(function () {
        el.style.transition = 'opacity .35s ease, transform .35s ease';
        el.style.opacity = '0';
        el.style.transform = 'translateY(-6px)';
        setTimeout(function () { el.remove(); }, 400);
      }, 4200 + i * 400);
    });
  }, 100);
})();
</script>
{% endif %}
