{% if page_obj.has_other_pages %}
<nav class="mt-8 flex flex-wrap items-center justify-center gap-2 text-sm" aria-label="Paginação">
  {% if page_obj.has_previous %}
  <a class="rounded-lg border border-white/10 px-3 py-1.5 text-slate-300 hover:bg-white/5" href="?page={{ page_obj.previous_page_number }}{% if qs_nopage %}&{{ qs_nopage }}{% endif %}">Anterior</a>
  {% endif %}
  <span class="px-2 text-slate-500">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
  <a class="rounded-lg border border-white/10 px-3 py-1.5 text-slate-300 hover:bg-white/5" href="?page={{ page_obj.next_page_number }}{% if qs_nopage %}&{{ qs_nopage }}{% endif %}">Próxima</a>
  {% endif %}
</nav>
{% endif %}
