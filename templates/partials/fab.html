{% if user.is_authenticated %}
<div class="fixed bottom-6 right-6 z-50">
  <details class="group relative">
    <summary class="flex cursor-pointer list-none items-center justify-center rounded-full bg-gradient-to-br from-orchid to-skyfi p-4 text-white shadow-lg shadow-orchid/30 ring-4 ring-night hover:opacity-95 [&::-webkit-details-marker]:hidden">
      <span class="sr-only">Ações rápidas</span>
      <svg class="h-7 w-7 transition group-open:rotate-45" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
    </summary>
    <div class="absolute bottom-full right-0 mb-3 w-52 overflow-hidden rounded-xl border border-white/10 bg-card py-1 shadow-xl">
      <a href="{% url 'finance:transaction_create' %}" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-200 hover:bg-white/5">
        <svg class="h-4 w-4 text-skyfi" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Nova transação
      </a>
      <a href="{% url 'finance:category_create' %}" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-200 hover:bg-white/5">
        <svg class="h-4 w-4 text-orchid" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
        Nova categoria
      </a>
      <a href="{% url 'finance:recurring_create' %}" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-200 hover:bg-white/5">
        <svg class="h-4 w-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Nova conta fixa
      </a>
    </div>
  </details>
</div>
{% endif %}
